services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodbi
      POSTGRES_PASSWORD: foodbi
      POSTGRES_DB: foodbi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodbi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: foodbi
      DB_PASSWORD: foodbi
      DB_NAME: foodbi
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
